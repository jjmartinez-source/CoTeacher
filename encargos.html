<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encargos - 3DInventions</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2e0066, #5a00cc);
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
    background: #1a0033;
    box-shadow: 0 0 15px rgba(255,255,0,0.4);
}

header h1 {
    color: #ffd700;
}

/* SECTION */
.section {
    text-align: center;
    padding: 30px;
}

h2 {
    color: #ffd700;
}

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

/* CARD */
.card {
    background: #1a0033;
    padding: 15px;
    border-radius: 15px;
    width: 250px;
    box-shadow: 0 0 15px rgba(255,255,0,0.4);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    margin-top: 10px;
    color: #ffd700;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 20px;
    background: #ffd700;
    color: #2e0066;
    text-decoration: none;
    border-radius: 10px;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 20px;
    border-radius: 50px;
    text-decoration: none;
}
</style>
</head>

<body>

<header>
    <h1>Encargos</h1>
</header>

<div class="section">
    <h2>Ejemplo de Producto</h2>

    <div class="card" style="margin:auto;">
        <img src="IMG_2303.jpg">
        <div class="price">L 100</div>
        <a class="btn" href="https://wa.me/504XXXXXXXX?text=Quiero%20este%20diseño" target="_blank">
            Pedir
        </a>
    </div>
</div>

<div class="section">
    <h2>Productos</h2>

    <div class="grid">

        <div class="card">
            <img src="IMG_2300.jpg">
            <div class="price">L 100</div>
            <a class="btn" href="https://wa.me/504XXXXXXXX">Comprar</a>
        </div>

        <div class="card">
            <img src="IMG_2301.jpg">
            <div class="price">L 100</div>
            <a class="btn" href="https://wa.me/504XXXXXXXX">Comprar</a>
        </div>

        <div class="card">
            <img src="IMG_2302.jpg">
            <div class="price">L 100</div>
            <a class="btn" href="https://wa.me/504XXXXXXXX">Comprar</a>
        </div>

    </div>
</div>

<div class="section">
    <a class="btn" href="index.html">⬅ Volver</a>
</div>

<a class="whatsapp" href="https://wa.me/504XXXXXXXX" target="_blank">
    WhatsApp
</a>

</body>
</html>
