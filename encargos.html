<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encargos - 3DInventions</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2e0066, #5a00cc);
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 25px;
    background: #1a0033;
    box-shadow: 0 0 15px rgba(255,255,0,0.4);
}

header h1 {
    color: #ffd700;
}

/* SECCIONES */
.section {
    padding: 30px;
    text-align: center;
}

h2 {
    color: #ffd700;
}

/* PRODUCTOS */
.grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    margin-top: 20px;
}

.card {
    background: #1a0033;
    border-radius: 15px;
    padding: 15px;
    width: 250px;
    box-shadow: 0 0 15px rgba(255,255,0,0.4);
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    margin-top: 10px;
    font-size: 1.2rem;
    color: #ffd700;
}

/* BOTONES */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #ffd700;
    color: #2e0066;
    text-decoration: none;
    border-radius: 10px;
    transition: 0.3s;
}

.btn:hover {
    background: #fff176;
    transform: scale(1.1);
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 20px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

.whatsapp:hover {
    background: #1ebe5d;
}
</style>
</head>

<body>

<header>
    <h1>Encargos Personalizados</h1>
</header>

<!-- PRODUCTO DESTACADO -->
<div class="section">
    <h2>Ejemplo de Producto</h2>

    <div class="card" style="margin:auto;">
        <img src="IMG_2303.jpg" alt="Producto ejemplo">
        <div class="price">L 100</div>
        <a class="btn" href="https://wa.me/504XXXXXXXX?text=Hola%20quiero%20un%20producto%20como%20este" target="_blank">
            Pedir por WhatsApp
        </a>
    </div>
</div>

<!-- PRODUCTOS -->
<div class="section">
    <h2>Productos Disponibles</h2>

    <div class="grid">

        <div class="card">
            <img src="IMG_2300.jpg">
            <div class="price">L 100</div>
            <a class="btn" href="https://wa.me/504XXXXXXXX?text=Quiero%20este%20producto" target="_blank">
                Comprar
            </a>
        </div>

        <div class="card">
            <img src="IMG_2301.jpg">
            <div class="price">L 100</div>
            <a class="btn" href="https://wa.me/504XXXXXXXX?text=Quiero%20este%20producto" target="_blank">
                Comprar
            </a>
        </div>

        <div class="card">
            <img src="IMG_2302.jpg">
            <div class="price">L 100</div>
            <a class="btn" href="https://wa.me/504XXXXXXXX?text=Quiero%20este%20producto" target="_blank">
                Comprar
            </a>
        </div>

    </div>
</div>

<!-- BOTON REGRESO -->
<div class="section">
    <a class="btn" href="index.html">⬅ Volver al menú principal</a>
</div>

<!-- WHATSAPP FLOAT -->
<a class="whatsapp" href="https://wa.me/504XXXXXXXX" target="_blank">
    WhatsApp
</a>

</body>
</html>
