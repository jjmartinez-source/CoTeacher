<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshBalance</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ffd6e0, #d4f8d4, #d4e7ff);
        color: #333;
        overflow-x: hidden;
    }

    /* HEADER */
    header {
        padding: 20px;
        text-align: center;
        font-size: 2.5rem;
        font-weight: bold;
        color: #4a4a4a;
    }

    /* INTRO */
    .intro {
        text-align: center;
        padding: 20px;
        font-size: 1.2rem;
    }

    /* MENU BUTTON */
    .menu-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #fff;
        border-radius: 50%;
        padding: 12px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        z-index: 1000;
        transition: 0.3s;
    }

    .menu-btn:hover {
        transform: scale(1.1);
    }

    /* SIDEBAR */
    .sidebar {
        position: fixed;
        top: 0;
        right: -250px;
        width: 250px;
        height: 100%;
        background: linear-gradient(180deg, #ffd6e0, #d4f8d4, #d4e7ff);
        padding-top: 80px;
        transition: 0.4s;
        box-shadow: -3px 0 10px rgba(0,0,0,0.2);
        z-index: 999;
    }

    .sidebar.active {
        right: 0;
    }

    /* BUTTONS */
    .sidebar button {
        display: block;
        width: 80%;
        margin: 20px auto;
        padding: 12px;
        border: none;
        border-radius: 20px;
        background: white;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
    }

    .sidebar button:hover {
        transform: translateX(-5px) scale(1.05);
        background: #f0f0f0;
    }

    /* WHATSAPP BUTTON */
    .whatsapp {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #25D366;
        color: white;
        padding: 15px;
        border-radius: 50%;
        font-size: 22px;
        text-decoration: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: 0.3s;
        z-index: 1000;
    }

    .whatsapp:hover {
        transform: scale(1.1);
    }

</style>
</head>

<body>

<header>FreshBalance</header>

<div class="intro">
    Bienvenido a FreshBalance 🌿  
    Tu espacio para un estilo de vida saludable, fresco y lleno de energía.
</div>

<!-- MENU BUTTON -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <button onclick="alert('Sección Encargos')">Encargos</button>
    <button onclick="alert('Sección Fresh Cups')">Fresh Cups</button>
    <button onclick="alert('Sección Fresh Bowls')">Fresh Bowls</button>
</div>

<!-- WHATSAPP BUTTON -->
<a href="https://wa.me/50400000000" class="whatsapp" target="_blank">💬</a>

<script>
    function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("active");
    }
</script>

</body>
</html>
