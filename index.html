<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DInventions</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2e0066, #5a00cc);
    color: white;
    overflow-x: hidden;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
    background: #1a0033;
    box-shadow: 0 0 15px rgba(255,255,0,0.4);
}

header h1 {
    font-size: 3rem;
    color: #ffd700;
}

/* INTRO */
.intro {
    text-align: center;
    padding: 40px 20px;
    max-width: 800px;
    margin: auto;
}

/* MENU */
.menu {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 30px;
}

.menu button {
    background: #ffd700;
    color: #2e0066;
    border: none;
    padding: 15px 25px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.menu button:hover {
    transform: scale(1.1);
    background: #fff176;
}

/* CONTENT */
.content {
    text-align: center;
    margin-top: 20px;
    font-size: 1.3rem;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 20px;
    border-radius: 50px;
    text-decoration: none;
}

/* GLOW */
.glow {
    position: fixed;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,0,0.3), transparent);
    border-radius: 50%;
    animation: moveGlow 8s infinite alternate;
}

@keyframes moveGlow {
    from { transform: translate(0,0); }
    to { transform: translate(300px, 200px); }
}
</style>
</head>

<body>

<header>
    <h1>3DInventions</h1>
</header>

<div class="intro">
    Bienvenido a <strong>3DInventions</strong>, donde tus ideas toman forma en impresión 3D.
</div>

<div class="menu">
    <button onclick="window.location.href='encargos.html'">Encargos</button>
    <button onclick="mostrar('Llaveros únicos en 3D.')">Llaveros</button>
    <button onclick="mostrar('Figuras decorativas.')">Figuras</button>
    <button onclick="mostrar('Diseños personalizados.')">Personalizados</button>
    <button onclick="mostrar('Productos más vendidos.')">Lo más vendido</button>
</div>

<div class="content" id="contenido">
    Selecciona una categoría.
</div>

<a class="whatsapp" href="https://wa.me/504XXXXXXXX" target="_blank">
    WhatsApp
</a>

<div class="glow"></div>

<script>
function mostrar(texto){
    document.getElementById("contenido").innerText = texto;
}
</script>

</body>
</html>
